[tool.poetry]
name = "apis-rdf-devops"
version = "0.1.0"
description = "Generic APIS project for auto devops"
authors = ["Matthias Schlögl <m.schloegl@gmail.com>"]
license = "MIT"


[tool.poetry.dependencies]  # main project dependencies
python = "~3.8.1"
acdh-django-charts = "^0.5.3"
apis-bibsonomy = "~0.3"
apis-core = "~0.17"
apis-highlighter = "~0.9"
dj-database-url = "^0.5.0"
django-allow-cidr = "^0.3.1"
django-csp = "^3.7"
django-extensions = "^3.1.3"
gunicorn = "^20.0.4"
mysqlclient = "^2.0.3"
sentry-sdk = "^0.19.5"
viecpro-vis = "^0.1.10"
whitenoise = "^5.2.0"

[tool.poetry.group.dev]
optional = true

[tool.poetry.group.dev.dependencies]
dephell = {extras = ["full"], version = "^0.8.3"}
jupyter = "^1.0.0"
jupyter-tabnine = "^1.2.3"
mistune = "<2.0.0"
pylint = "^2.6.0"
black = "^22.10.0"
flake8 = "^6.0.0"


[tool.poetry.group.frischmuth.dependencies]
pyzotero = "^1.5.5"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
